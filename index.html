<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run - Hand Gesture Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="game-canvas" width="1100" height="600"></canvas>
        
        <!-- Score and UI Overlays -->
        <div id="ui-layer">
            <div id="speed-meter">
                <div id="speed-bar-bg">
                    <div id="speed-bar-fill"></div>
                </div>
                <div id="speed-label">SPEED 8.0</div>
            </div>
            
            <div id="score-display">
                <span id="hi-score">HI 00000</span>
                <span id="current-score">00000</span>
            </div>
            
            <div id="start-screen" class="screen overlay">
                <h1>DINO RUN</h1>
                <h2 class="accent-text">HAND GESTURE EDITION</h2>
                <p>Pinch your thumb & index finger to jump</p>
                <p>or press SPACE</p>
                <p class="small-text">Point your webcam at your hand &middot; Click to start</p>
            </div>
            
            <div id="game-over-screen" class="screen overlay hidden">
                <h1>G A M E &nbsp; O V E R</h1>
                <p>Pinch or press SPACE to restart</p>
            </div>
        </div>

        <!-- PIP Webcam Feed (Corner) -->
        <div id="pip-container">
            <!-- Hidden video element for MediaPipe -->
            <video id="webcam-video" style="display: none;" autoplay muted playsinline></video>
            <!-- Canvas to draw webcam stream and hand landmarks -->
            <canvas id="webcam-canvas" width="280" height="210"></canvas>
            <div id="pip-label">Open hand | Pinch to jump</div>
        </div>
    </div>
    
    <!-- Game Modules -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
